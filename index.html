<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinyl Turntable</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0d2a2a; }
  canvas { display: block; width: 100%; height: 100%; }
  #loading {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #0d2a2a; display: flex; align-items: center; justify-content: center;
    z-index: 100; transition: opacity 0.8s ease;
  }
  #loading.fade { opacity: 0; pointer-events: none; }
  .spinner {
    width: 40px; height: 40px; border: 3px solid #1a4a4a;
    border-top-color: #39c5bb; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="loading"><div class="spinner"></div></div>
<script type="module" src="js/main.js"></script>
</body>
</html>
